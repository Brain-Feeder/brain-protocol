name: Class D conformance

# The executable TCK in CI is the release gate (BP-09 §1, layer 2): green on every push.
# The kit runs the full Class D suite against the reference pipe; the break-a-law harness proves
# the kit can still catch a broken law (T-REF-02).

on:
  push:
  pull_request:

jobs:
  class-d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install kit and reference dependencies
        run: |
          cd kit && npm ci || npm install
          cd ../reference && npm ci || npm install

      - name: Typecheck
        run: |
          cd kit && npx tsc -p tsconfig.json --noEmit
          cd ../reference && npx tsc -p tsconfig.json

      - name: Run the Class D suite against the reference (46/46)
        run: bash run-conformance.sh --out kit/results.json

      - name: Prove the kit is not coupled to the reference's name (rename + re-run)
        # The kit must learn the target's id from its card, never assume it (TPMS friction log).
        # Renaming the reference and re-passing 46/46 guards against that coupling regressing.
        run: BRAIN_SYSTEM_ID=renamed-pipe PORT=8090 bash run-conformance.sh --out kit/results-renamed.json

      - name: Prove the kit catches a broken law (T-REF-02)
        run: cd reference && bash break-a-law.sh

      - name: Verify the connect handshake (BP-03 §6.4, AC-03.6)
        # Both sides of the consumer-initiated handshake in-process: happy path + the refusals.
        run: cd kit && node connect-handshake-check.mjs

      - name: Verify the conformance registry (BP-09 §4 — chain, signatures, schema)
        run: |
          cd registry && (npm ci || npm install)
          npx tsx src/cli.ts verify

      - name: Upload conformance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tck-results
          path: kit/results*.json
